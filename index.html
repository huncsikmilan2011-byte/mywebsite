<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milan Huncsik | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
        }

        .profile-card {
            text-align: center;
            padding: 50px 40px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 4px;
            animation: slideUp 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .name {
            font-size: 2.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 8px;
            line-height: 1;
        }

        .bio {
            font-weight: 300;
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 35px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: #000;
            background: #fff;
            padding: 16px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            border: 1px solid #fff;
        }

        .btn:hover {
            background: transparent;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        .btn-outline {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-outline:hover {
            border-color: #fff;
            background: rgba(255,255,255,0.05);
        }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="wrapper">
        <div class="profile-card">
            <h1 class="name">H1MILAN</h1>
            <p class="bio">Coder & EX FN PRO</p>                        
            <p class="bio">Made by h1milan_ </p>
            
            <div class="links">
                <a href="https://www.facebook.com/milan.huncsik.gt/" target="_blank" class="btn">Facebook</a>
                <a href="https://www.tiktok.com/@foxyz7877" target="_blank" class="btn btn-outline">TikTok</a>
                <a href="https://www.instagram.com/h1milan_/" target="_blank" class="btn btn-outline">Instagram</a>
                <a href="https://discord.gg/zbWyTVRg" target="_blank" class="btn btn-outline">Discord Server</a>
                <a href="https://github.com/huncsikmilan2011-byte" target="_blank" class="btn-outline">Github</a>
                <a href="https://itch.io/profile/milan21212" target="_blank" class="btn-outline">Itch.io</a>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 90, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3, "random": true },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.15, "width": 1 },
                "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 220, "line_linked": { "opacity": 0.6 } }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
